name: birdle
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  intl: ^0.20.2
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.25.6
  lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Bonbon
      fonts:
        - asset: fonts/Bonbon-Regular.ttf
          weight: 400
          style: normal

  assets:
    - assets/pngs/
    - assets/riskaware/
